<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Study Buddy Bro</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --black:   #0a0a0a;
    --dark:    #141414;
    --card:    #1a1a1a;
    --border:  #2a2a2a;
    --beige:   #e8dcc8;
    --beige2:  #f5efe3;
    --gold:    #c9a84c;
    --gold2:   #e8c46a;
    --white:   #f8f6f2;
    --muted:   #6b6560;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--black);
    color: var(--white);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--dark);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }

  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    color: var(--white);
    letter-spacing: 0.01em;
  }

  .logo-text span { color: var(--gold); }

  .agents-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .agent-badge {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.7rem;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.02em;
  }

  /* ── Chat ── */
  .chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .chat-box::-webkit-scrollbar { width: 4px; }
  .chat-box::-webkit-scrollbar-track { background: transparent; }
  .chat-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Center the messages in a max-width column */
  .chat-inner {
    width: 100%;
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .avatar.bot  { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: var(--black); }
  .avatar.user-av { background: var(--card); border: 1px solid var(--border); color: var(--beige); }

  .bubble {
    max-width: 72%;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 0.88rem;
    line-height: 1.65;
    white-space: pre-wrap;
  }

  .msg.bot  .bubble {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--beige2);
    border-top-left-radius: 4px;
  }

  .msg.user .bubble {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: var(--black);
    font-weight: 500;
    border-top-right-radius: 4px;
  }

  /* typing */
  .typing .bubble {
    display: flex; gap: 5px; align-items: center;
    padding: 14px 18px;
  }
  .dot {
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: bounce 1.1s infinite;
    opacity: 0.6;
  }
  .dot:nth-child(2) { animation-delay: 0.18s; }
  .dot:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce {
    0%,80%,100% { transform: scale(0.75); opacity: 0.4; }
    40%         { transform: scale(1.2);  opacity: 1; }
  }

  /* ── Input ── */
  .input-wrap {
    flex-shrink: 0;
    padding: 14px 20px 18px;
    background: var(--dark);
    border-top: 1px solid var(--border);
  }

  .input-inner {
    max-width: 760px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .input-inner input {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 18px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-inner input::placeholder { color: var(--muted); }
  .input-inner input:focus { border-color: var(--gold); }

  .send-btn {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border: none;
    border-radius: 10px;
    width: 48px; height: 48px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    color: var(--black);
    transition: opacity 0.2s, transform 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover:not(:disabled) { opacity: 0.88; transform: scale(1.04); }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .status-bar {
    text-align: center;
    font-size: 0.68rem;
    color: #3a3632;
    padding-top: 6px;
    letter-spacing: 0.04em;
  }

  .status-dot {
    display: inline-block;
    width: 5px; height: 5px;
    background: var(--gold);
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
    opacity: 0.7;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .agents-row { display: none; }
    .header { padding: 12px 16px; }
    .bubble { max-width: 86%; }
    .chat-box { padding: 18px 12px; }
    .input-wrap { padding: 10px 12px 14px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">📚</div>
    <div class="logo-text">Study Buddy <span>Bro</span></div>
  </div>
  <div class="agents-row">
    <span class="agent-badge">📅 Schedule</span>
    <span class="agent-badge">📝 Quiz</span>
    <span class="agent-badge">💡 Explainer</span>
    <span class="agent-badge">📊 Progress</span>
    <span class="agent-badge">📧 Reminder</span>
  </div>
</div>

<div class="chat-box" id="chatBox">
  <div class="chat-inner" id="chatInner">
    <div class="msg bot">
      <div class="avatar bot">✦</div>
      <div class="bubble">Hey! I'm <strong>Study Buddy Bro</strong> — what are you studying today?</div>
    </div>
  </div>
</div>

<div class="input-wrap">
  <div class="input-inner">
    <input
      type="text"
      id="userInput"
      placeholder="Ask me anything — explain a topic, quiz me, plan my schedule..."
      onkeydown="if(event.key==='Enter') sendMessage()"
    />
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
  <div class="status-bar">
    <span class="status-dot"></span>
    Study Buddy Bro — powered by Google ADK · Gemini · Firestore
  </div>
</div>

<script>
  let sessionId = localStorage.getItem("sbb_session") || generateId();
  localStorage.setItem("sbb_session", sessionId);

  function generateId() {
    return "sbb_" + Math.random().toString(36).substr(2, 9);
  }

  async function sendMessage() {
    const input   = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const msg     = input.value.trim();
    if (!msg) return;

    appendMessage("user", msg);
    input.value = "";
    sendBtn.disabled = true;

    const typingId = showTyping();

    try {
      const res  = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: msg, session_id: sessionId })
      });
      const data = await res.json();
      removeTyping(typingId);

      if (data.status === "success") {
        appendMessage("bot", data.reply);
      } else {
        appendMessage("bot", "Something went wrong. Please try again.\n\nError: " + (data.error || "Unknown"));
      }
    } catch (err) {
      removeTyping(typingId);
      appendMessage("bot", "Connection error — make sure the server is running.");
    }

    sendBtn.disabled = false;
    input.focus();
  }

  function appendMessage(role, text) {
    const inner   = document.getElementById("chatInner");
    const chatBox = document.getElementById("chatBox");
    const div     = document.createElement("div");
    div.className = `msg ${role === "user" ? "user" : "bot"}`;
    const avatarHTML = role === "user"
      ? `<div class="avatar user-av">👤</div>`
      : `<div class="avatar bot">✦</div>`;
    div.innerHTML = `${avatarHTML}<div class="bubble">${text.replace(/</g,"&lt;").replace(/>/g,"&gt;")}</div>`;
    inner.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function showTyping() {
    const inner   = document.getElementById("chatInner");
    const chatBox = document.getElementById("chatBox");
    const id      = "typing_" + Date.now();
    const div     = document.createElement("div");
    div.className = "msg bot typing";
    div.id        = id;
    div.innerHTML = `<div class="avatar bot">✦</div><div class="bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    inner.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    return id;
  }

  function removeTyping(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }
</script>
</body>
</html>
